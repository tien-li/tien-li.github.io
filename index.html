    <div class = "time">
        <div id="nowDiv"></div>
        <script>
            function show(){
            var date = new Date(); 
            var now = "";
        
            now = now + (date.getMonth()+1); 
            now = now + "-"
            now = now + date.getDate();
            now = now + "-"
            now = now + date.getFullYear();
            now = now + "  "; 
            now = now + date.getHours();
            now = now + ":"
            now = now + date.getMinutes();
            now = now + ":"
            now = now + date.getSeconds();
            document.getElementById("nowDiv"). innerHTML = now; 
            setTimeout("show()",1000); 
    }
    </script>
